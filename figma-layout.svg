<svg width="1440" height="4300" viewBox="0 0 1440 4300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #000; }
      .panel { fill: #0A0A0A; stroke: #2A2A2A; stroke-width: 1; }
      .stroke { fill: none; stroke: #2A2A2A; stroke-width: 1; }
      .txt { fill: #FFF; font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .sub { fill: #B3B3B3; font-family: Arial, sans-serif; font-size: 14px; }
      .tag { fill: #161616; stroke: #3A3A3A; stroke-width: 1; }
      .label { fill: #EDEDED; font-family: Arial, sans-serif; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="4300"/>

  <!-- Topbar -->
  <rect class="panel" x="0" y="0" width="1440" height="78"/>
  <text class="txt" x="120" y="50">НПО Мелодия</text>
  <text class="sub" x="580" y="48">Ивенты  Календарь  Артисты  Релизы  Трансляции  Мерч  Контакты</text>
  <rect class="tag" x="1260" y="20" width="64" height="36" rx="18"/>
  <text class="label" x="1284" y="43">Live</text>

  <!-- Intro / Hero -->
  <rect class="panel" x="120" y="110" width="1200" height="760" rx="18"/>
  <text class="txt" x="170" y="170">INTRO / HERO IMAGE</text>
  <text class="sub" x="170" y="198">Полноэкранная стартовая секция</text>

  <!-- Events -->
  <text class="txt" x="120" y="955">АФИША</text>
  <rect class="panel" x="120" y="980" width="285" height="300" rx="14"/>
  <rect class="panel" x="425" y="980" width="285" height="300" rx="14"/>
  <rect class="panel" x="730" y="980" width="285" height="300" rx="14"/>
  <rect class="panel" x="1035" y="980" width="285" height="300" rx="14"/>

  <!-- Calendar -->
  <text class="txt" x="120" y="1375">КАЛЕНДАРЬ</text>
  <rect class="panel" x="120" y="1400" width="760" height="480" rx="14"/>
  <rect class="panel" x="900" y="1400" width="420" height="480" rx="14"/>
  <text class="sub" x="160" y="1440">Месячная сетка (7 колонок)</text>
  <text class="sub" x="940" y="1440">Карточка выбранного дня</text>

  <!-- Artists -->
  <text class="txt" x="120" y="1975">АРТИСТЫ &amp; БУКИНГ</text>
  <rect class="panel" x="120" y="2000" width="1200" height="420" rx="14"/>
  <rect class="stroke" x="160" y="2040" width="260" height="320" rx="12"/>
  <rect class="stroke" x="440" y="2040" width="260" height="320" rx="12"/>
  <rect class="stroke" x="720" y="2040" width="260" height="320" rx="12"/>
  <rect class="stroke" x="1000" y="2040" width="260" height="320" rx="12"/>

  <!-- Releases -->
  <text class="txt" x="120" y="2515">РЕЛИЗЫ</text>
  <rect class="panel" x="120" y="2540" width="1200" height="420" rx="14"/>
  <rect class="stroke" x="160" y="2580" width="260" height="320" rx="12"/>
  <rect class="stroke" x="440" y="2580" width="260" height="320" rx="12"/>
  <rect class="stroke" x="720" y="2580" width="260" height="320" rx="12"/>
  <rect class="stroke" x="1000" y="2580" width="260" height="320" rx="12"/>

  <!-- Streams -->
  <text class="txt" x="120" y="3055">ТРАНСЛЯЦИИ</text>
  <rect class="panel" x="120" y="3080" width="590" height="360" rx="14"/>
  <rect class="panel" x="730" y="3080" width="590" height="360" rx="14"/>
  <text class="sub" x="160" y="3120">Live блок</text>
  <text class="sub" x="770" y="3120">Архив трансляций</text>

  <!-- Merch -->
  <text class="txt" x="120" y="3535">МЕРЧ</text>
  <rect class="panel" x="120" y="3560" width="285" height="300" rx="14"/>
  <rect class="panel" x="425" y="3560" width="285" height="300" rx="14"/>
  <rect class="panel" x="730" y="3560" width="285" height="300" rx="14"/>
  <rect class="panel" x="1035" y="3560" width="285" height="300" rx="14"/>

  <!-- Contacts -->
  <text class="txt" x="120" y="3945">КОНТАКТЫ</text>
  <rect class="panel" x="120" y="3970" width="1200" height="220" rx="14"/>
  <text class="sub" x="160" y="4020">Адрес / Букинг / Пресса / Соцсети</text>

  <!-- Footer -->
  <line class="stroke" x1="120" y1="4230" x2="1320" y2="4230"/>
  <text class="sub" x="120" y="4260">© 2026 НПО Мелодия</text>
</svg>
